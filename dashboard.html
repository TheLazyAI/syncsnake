    <style>
        :root {
            /* Adaptive Surface Tiers */
            --bg-color: #0b1326;
            --surface-lowest: #060e20;
            --surface-low: #131b2e;
            --surface-container: #171f33;
            --surface-variant: #2d3449;
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.2);
            --secondary: #aa0266;
            --secondary-glow: rgba(170, 2, 102, 0.3);
            --outline: #859397;
            --outline-variant: #3c494c;
        }

        body {
            background-color: var(--bg-color);
            color: #dae2fd;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none;
            /* Liquid Glass / Adaptive background */
            background-image: radial-gradient(circle at 10% 20%, rgba(34, 211, 238, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(170, 2, 102, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--surface-variant); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--outline-variant); }

        /* Liquid Glass Panel */
        .glass-panel {
            background: rgba(23, 31, 51, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(133, 147, 151, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        /* Tactile Micro-Animations */
        .tactile-btn {
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .tactile-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .tactile-btn:active {
            transform: translateY(1px);
        }
        .bento-card {
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .bento-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(34, 211, 238, 0.3);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3), 0 0 15px var(--primary-glow);
        }

        /* Glow utilities */
        .glow-cyan { box-shadow: 0 0 20px var(--primary-glow); }
        .glow-crimson { box-shadow: 0 0 20px var(--secondary-glow); }

        /* 3D Scene Styles for Rolodex - True Cylinder */
        .scene {
            width: 100%;
            height: 100%;
            flex: 1;
            perspective: 2000px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            bottom: 0;
        }
        .carousel-cell {
            position: absolute;
            width: 680px;
            height: 480px;
            left: 50%;
            margin-left: -340px;
            bottom: 90px;
            background-color: #171f33 !important;
            backdrop-filter: none !important;
            border: 2px solid #3c494c !important;
            border-radius: 24px;
            backface-visibility: hidden;
            padding: 32px;
            display: flex;
            flex-direction: column;
            transform-origin: center bottom;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            transition: opacity 0.3s, filter 0.3s;
        }
        .carousel-cell.bg-on-surface {
            background-color: #dae2fd !important;
            color: #0b1326 !important;
        }
        .carousel-cell.bg-primary {
            background-color: #22d3ee !important;
        }
        .carousel-cell.bg-secondary {
            background-color: #aa0266 !important;
        }
        .carousel-cell.is-inactive {
            pointer-events: none;
        }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }

        .hidden { display: none !important; }

        /* Toggle switch */
        .toggle-bg {
            position: relative;
            background: var(--surface-lowest);
            border: 1px solid var(--outline-variant);
            border-radius: 999px;
            padding: 4px;
            display: inline-flex;
            cursor: pointer;
        }
        .toggle-pill {
            position: absolute;
            top: 4px;
            bottom: 4px;
            width: calc(50% - 4px);
            background: var(--surface-variant);
            border-radius: 999px;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 0;
        }
        .toggle-option {
            position: relative;
            z-index: 1;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--outline);
            transition: color 0.3s;
            text-transform: uppercase;
        }
        .toggle-option.active { color: var(--primary); }
        .toggle-bg[data-view="expanded"] .toggle-pill { transform: translateX(100%); }
    </style>

        function updateCarousel() {
            if (panelCount === 0) return;

            // Rotate the whole drum — stitch-style true cylinder
            carousel.style.transform = `translateZ(-${radius}px) rotateX(${-currAngle}deg)`;

            const rawIndex = Math.round(currAngle / theta) % panelCount;
            selectedIndex = rawIndex < 0 ? panelCount + rawIndex : rawIndex;

            const cells = carousel.children;
            for (let i = 0; i < cells.length; i++) {
                const angle = theta * i;
                let relAngle = (angle - currAngle) % 360;
                if (relAngle > 180)  relAngle -= 360;
                if (relAngle < -180) relAngle += 360;
                const dist = Math.abs(relAngle);

                if (dist < theta / 2) {
                    cells[i].classList.remove('is-inactive');
                    cells[i].style.opacity = '1';
                    cells[i].style.filter = 'none';
                    cells[i].style.zIndex = '100';
                } else {
                    cells[i].classList.add('is-inactive');
                    const factor = Math.max(0, 1 - dist / 90);
                    cells[i].style.opacity = (factor * 0.75 + 0.05).toString();
                    cells[i].style.filter = `brightness(${0.3 + factor * 0.3}) blur(${Math.min(6, dist / 20)}px)`;
                    cells[i].style.zIndex = Math.floor(100 - dist).toString();
                }
            }

            const dots = navDots.children;
            for (let i = 0; i < dots.length; i++) {
                dots[i].className = `h-1.5 rounded-full transition-all duration-300 ${i === selectedIndex ? 'w-6 bg-primary glow-cyan' : 'w-1.5 bg-outline-variant/40'}`;
            }
        }

        function snapToNearest() {
            if (panelCount === 0) return;
            const snapAngle = Math.round(currAngle / theta) * theta;
            const start = currAngle;
            const change = snapAngle - start;
            let currentTime = 0;
            const duration = 25;
            function animateSnap() {
                currentTime++;
                const ease = 1 - Math.pow(1 - currentTime / duration, 3);
                currAngle = start + change * ease;
                updateCarousel();
                if (currentTime < duration) animationFrame = requestAnimationFrame(animateSnap);
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animateSnap();
        }

            const rc = document.getElementById('view-showcase');

            rc.addEventListener('mousedown', (e) => {
                isDragging = true; lastFrameY = e.clientY; velocity = 0;
                if (animationFrame) cancelAnimationFrame(animationFrame);
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaY = e.clientY - lastFrameY; lastFrameY = e.clientY;
                currAngle += deltaY * 0.15;
                velocity = deltaY * 0.4;
                updateCarousel();
            });
            window.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;
                applyInertia();
            });
            rc.addEventListener('wheel', (e) => {
                e.preventDefault();
                currAngle += e.deltaY * 0.08;
                updateCarousel();
                clearTimeout(window.wheelTimeout);
                window.wheelTimeout = setTimeout(snapToNearest, 200);
            }, { passive: false });

            function applyInertia() {
                if (Math.abs(velocity) < 0.2) { snapToNearest(); return; }
                currAngle += velocity;
                velocity *= 0.92;
                updateCarousel();
                animationFrame = requestAnimationFrame(applyInertia);
            }
        }

        function rotateToNext() {
            if (panelCount) {
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animateTo(Math.round(currAngle / theta) * theta + theta);
            }
        }
        function rotateToPrev() {
            if (panelCount) {
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animateTo(Math.round(currAngle / theta) * theta - theta);
            }
        }
        function animateTo(target) {
            const start = currAngle;
            const change = target - start;
            let t = 0;
            function frame() {
                t += 0.05;
                if (t >= 1) {
                    currAngle = target;
                    updateCarousel();
                    return;
                }
                const ease = 1 - Math.pow(1 - t, 5);
                currAngle = start + change * ease;
                updateCarousel();
                animationFrame = requestAnimationFrame(frame);
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
            frame();
        }

        window.addEventListener('keydown', (e) => {
            if (currentView === "showcase") {
                if (e.key === 'ArrowUp') rotateToPrev();
                if (e.key === 'ArrowDown') rotateToNext();
            }
        });

// ==========================================
        // EXPANDED BENTO GRID LOGIC
        // ==========================================

        function renderExpandedGrid() {
            const container = document.getElementById("opp-container");
            container.innerHTML = "";

            const items = catalogueData[activeTab] || [];
            const config = categoryConfigs[activeTab];

            const filteredItems = items.filter(item => {
                if (!searchQuery) return true;
                return Object.values(item).some(val => val && val.toString().toLowerCase().includes(searchQuery));
            });

            document.getElementById("results-count-badge").innerText = `Showing ${filteredItems.length} of ${items.length} records`;

            if (filteredItems.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-outline">No records match your search.</div>`;
                return;
            }

            filteredItems.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-surface-lowest border border-outline-variant/40 rounded-2xl p-6 flex flex-col bento-card relative overflow-hidden group";

                const title = item[config.titleKey] || "Untitled";
                const subtitle = item[config.subtitleKey] || "";
                const desc = item[config.descKey] || "No description provided.";
                const link = item[config.urlKey] || "#";
                
                let pillsHtml = "";
                if (config.pills) {
                    config.pills.forEach(pillKey => {
                        if (item[pillKey]) {
                            pillsHtml += `<span class="bg-surface-variant text-outline text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md border border-outline-variant/50">${item[pillKey]}</span>`;
                        }
                    });
                }

                card.innerHTML = `
                    <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                        <span class="material-symbols-outlined text-6xl text-primary">${config.icon}</span>
                    </div>
                    
                    <div class="relative z-10 flex flex-col h-full">
                        <h4 class="text-xl font-bold text-on-surface mb-1 pr-12 leading-tight">${title}</h4>
                        ${subtitle ? `<p class="text-sm font-medium text-primary mb-4 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">my_location</span>${subtitle}</p>` : '<div class="h-4 mb-4"></div>'}
                        
                        <div class="flex flex-wrap gap-2 mb-5">
                            ${pillsHtml}
                        </div>
                        
                        <div class="bg-surface-container/50 border border-outline-variant/30 rounded-xl p-4 flex-1 mb-5">
                            <p class="text-sm text-on-surface-variant font-light leading-relaxed line-clamp-4">${desc}</p>
                        </div>
                        
                        <div class="mt-auto pt-4 border-t border-outline-variant/20 flex justify-between items-center">
                            <div class="text-xs font-mono text-outline truncate max-w-[60%]">
                                ${item[config.contactKey] || "No contact info"}
                            </div>
                            <a href="${link.startsWith('http') ? link : 'http://'+link}" target="_blank" class="text-primary hover:text-white bg-primary/10 hover:bg-primary transition-colors p-2 rounded-lg tactile-btn">
                                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
