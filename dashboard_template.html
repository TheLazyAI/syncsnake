<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SyncSnake | Agency Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            /* Adaptive Surface Tiers */
            --bg-color: #0b1326;
            --surface-lowest: #060e20;
            --surface-low: #131b2e;
            --surface-container: #171f33;
            --surface-variant: #2d3449;
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.2);
            --secondary: #aa0266;
            --secondary-glow: rgba(170, 2, 102, 0.3);
            --outline: #859397;
            --outline-variant: #3c494c;
        }

        body {
            background-color: var(--bg-color);
            color: #dae2fd;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none;
            /* Liquid Glass / Adaptive background */
            background-image: radial-gradient(circle at 10% 20%, rgba(34, 211, 238, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(170, 2, 102, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--surface-variant); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--outline-variant); }

        /* Liquid Glass Panel */
        .glass-panel {
            background: rgba(23, 31, 51, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(133, 147, 151, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        /* Tactile Micro-Animations */
        .tactile-btn {
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .tactile-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .tactile-btn:active {
            transform: translateY(1px);
        }
        .bento-card {
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .bento-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(34, 211, 238, 0.3);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3), 0 0 15px var(--primary-glow);
        }

        /* Glow utilities */
        .glow-cyan { box-shadow: 0 0 20px var(--primary-glow); }
        .glow-crimson { box-shadow: 0 0 20px var(--secondary-glow); }

        /* 3D Scene Styles for Rolodex - Over-the-Hill Arc */
        .scene {
            width: 100%;
            height: 100%;
            flex: 1;
            perspective: 1800px;
            perspective-origin: 50% 40%; /* eye slightly raised — gentle look-down, no back-card poke */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            top: 0;
            left: 0;
        }
        .carousel-cell {
            position: absolute;
            width: 680px;
            height: 480px;
            left: 50%;
            top: 50%;
            margin-left: -340px;
            margin-top: -240px;
            will-change: transform, opacity;
            background-color: #171f33 !important;
            backdrop-filter: none !important;
            border: 2px solid #3c494c !important;
            border-radius: 24px;
            backface-visibility: hidden;
            padding: 32px;
            display: flex;
            flex-direction: column;
            transform-origin: center center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.85);
            transition: opacity 0.25s, filter 0.25s;
        }
        .carousel-cell.bg-on-surface {
            background-color: #dae2fd !important;
            color: #0b1326 !important;
        }
        .carousel-cell.bg-primary {
            background-color: #22d3ee !important;
        }
        .carousel-cell.bg-secondary {
            background-color: #aa0266 !important;
        }
        .carousel-cell.is-inactive {
            pointer-events: none;
        }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }

        .hidden { display: none !important; }

        /* Toggle switch */
        .toggle-bg {
            position: relative;
            background: var(--surface-lowest);
            border: 1px solid var(--outline-variant);
            border-radius: 999px;
            padding: 4px;
            display: inline-flex;
            cursor: pointer;
        }
        .toggle-pill {
            position: absolute;
            top: 4px;
            bottom: 4px;
            width: calc(50% - 4px);
            background: var(--surface-variant);
            border-radius: 999px;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 0;
        }
        .toggle-option {
            position: relative;
            z-index: 1;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--outline);
            transition: color 0.3s;
            text-transform: uppercase;
        }
        .toggle-option.active { color: var(--primary); }
        .toggle-bg[data-view="expanded"] .toggle-pill { transform: translateX(100%); }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                  "primary": "#22d3ee",
                  "on-primary": "#00363e",
                  "secondary": "#aa0266",
                  "on-secondary": "#ffbad3",

                  "surface": "#0b1326",
                  "surface-container-lowest": "#060e20",
                  "surface-container-low": "#131b2e",
                  "surface-container": "#171f33",
                  "surface-variant": "#2d3449",
                  "outline": "#859397",
                  "outline-variant": "#3c494c",
                  "on-surface": "#dae2fd",
                  "on-surface-variant": "#bbc9cd"
              },
              spacing: {
                  "sidebar-width": "280px",
                  "gutter": "32px"
              }
            }
          }
        }
    </script>
</head>

    <script>
        const catalogueData = %DATA%;
        
        const categoryConfigs = {
            agencies: {
                label: "Sync Agencies", icon: "corporate_fare",
                titleKey: "name", subtitleKey: "location", descKey: "submission_guidelines",
                pills: ["roster_genre_focus", "regions"], urlKey: "website", contactKey: "contact_info"
            },
            supervisors: {
                label: "Music Supervisors", icon: "groups",
                titleKey: "name", subtitleKey: "company", descKey: "submission_policy",
                pills: ["location", "notable_projects"], urlKey: "contact_info", contactKey: "contact_info"
            },
            platforms: {
                label: "Brief Platforms", icon: "assignment",
                titleKey: "name", subtitleKey: "requirements", descKey: "description",
                pills: ["requirements"], urlKey: "url", contactKey: "url"
            },
            grants: {
                label: "Grants & Funding", icon: "payments",
                titleKey: "name", subtitleKey: "organization", descKey: "eligibility_summary",
                pills: ["deadlines"], urlKey: "url", contactKey: "deadlines"
            },
            festivals: {
                label: "Showcase Festivals", icon: "theater_comedy",
                titleKey: "name", subtitleKey: "location", descKey: "requirements_fees",
                pills: ["application_window"], urlKey: "url", contactKey: "application_window"
            },
            indie_games: {
                label: "Indie Video Games", icon: "sports_esports",
                titleKey: "project_name", subtitleKey: "developer_studio", descKey: "status_or_needs",
                pills: [], urlKey: "url", contactKey: "contact_info"
            },
            ad_agencies: {
                label: "Ad Agencies", icon: "campaign",
                titleKey: "name", subtitleKey: "location", descKey: "creative_director_or_leads",
                pills: ["location"], urlKey: "website", contactKey: "contact_info"
            },
            music_libraries: {
                label: "Music Libraries", icon: "library_music",
                titleKey: "name", subtitleKey: "submission_status", descKey: "requirements_genres",
                pills: ["payout_model"], urlKey: "url", contactKey: "submission_status"
            },
            competitions: {
                label: "Competitions", icon: "emoji_events",
                titleKey: "name", subtitleKey: "deadlines", descKey: "prizes_categories",
                pills: ["entry_fees_requirements"], urlKey: "url", contactKey: "deadlines"
            },
            restricted_resources: {
                label: "Restricted Resources", icon: "lock",
                titleKey: "source_name", subtitleKey: "reason_for_restriction", descKey: "expected_value",
                pills: ["reason_for_restriction"], urlKey: "url", contactKey: "url"
            }
        };

        // ==========================================
        // DATA HYGIENE — clean placeholders, drop expired/vacant, de-dupe.
        // Shared by the nav, the showcase rolodex and the expanded grid so
        // every view shows the same clean, actionable set.
        // ==========================================
        const PLACEHOLDER_RE = /^(n\/?a|none|null|tbd|unknown|-+|—+|\.+|not\s+(specified|provided|explicitly|directly|publicly|available|applicable|listed|disclosed|stated|mentioned|given|found|known)\b.*|implied\b.*|official\s+website\b.*|visit\b.*website.*|see\b.*website.*|refer\s+to\b.*|contact\s+(via|through)\b.*|direct\s+music\s+production\s+contacts\b.*|their\s+(official\s+)?website\b.*)$/i;

        function clean(val) {
            if (val === null || val === undefined) return "";
            const s = String(val).trim();
            if (s.length < 2) return "";
            if (PLACEHOLDER_RE.test(s)) return "";
            return s;
        }
        function isRealUrl(val) {
            const s = clean(val);
            if (!s) return false;
            if (/^https?:\/\//i.test(s)) return true;
            return !/\s/.test(s) && (/^[\w-]+(\.[\w-]+)+(\/.*)?$/.test(s) || /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(s));
        }
        function hrefFor(val) {
            const s = clean(val);
            if (/^https?:\/\//i.test(s)) return s;
            if (/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(s)) return "mailto:" + s;
            return "http://" + s;
        }

        // The catalogue is itself Google-grounded, so when we don't have a
        // verified link we hand the user a context-rich Google search instead
        // of a dead end. Qualifiers + location make results land on target.
        const SEARCH_QUALIFIERS = {
            agencies: "sync licensing agency music submission",
            supervisors: "music supervisor submit music contact",
            platforms: "music sync submission",
            grants: "grant for musicians how to apply",
            festivals: "festival submit music application",
            indie_games: "indie game music composer contact",
            ad_agencies: "advertising agency music submission contact",
            music_libraries: "production music library submit music",
            competitions: "music competition entry submission",
            restricted_resources: "music submission"
        };
        function googleSearchUrl(item, config, tab) {
            const name = clean(item[config.titleKey]) || "";
            const loc = clean(item.location) || clean(item.regions) || "";
            const q = `"${name}" ${SEARCH_QUALIFIERS[tab] || "music sync"} ${loc}`.trim();
            return "https://www.google.com/search?q=" + encodeURIComponent(q);
        }

        const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
        function extractDates(str) {
            const s = String(str || ""); const out = []; let m;
            const re1 = /\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2})(?:st|nd|rd|th)?,?\s+(\d{4})\b/gi;
            while ((m = re1.exec(s))) out.push(new Date(+m[3], MONTHS[m[1].slice(0,3).toLowerCase()], +m[2]));
            const re2 = /\b(\d{4})-(\d{1,2})-(\d{1,2})\b/g;
            while ((m = re2.exec(s))) out.push(new Date(+m[1], +m[2]-1, +m[3]));
            const re3 = /\b(\d{1,2})\/(\d{1,2})\/(\d{4})\b/g;
            while ((m = re3.exec(s))) out.push(new Date(+m[3], +m[1]-1, +m[2]));
            const re4 = /\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{4})\b/gi;
            while ((m = re4.exec(s))) out.push(new Date(+m[2], MONTHS[m[1].slice(0,3).toLowerCase()]+1, 0));
            return out.filter(d => !isNaN(d));
        }
        function latestDeadline(item) {
            const fields = [item.deadlines, item.application_window, item.application_deadline, item.submission_deadline];
            let latest = null;
            fields.forEach(f => extractDates(f).forEach(d => { if (!latest || d > latest) latest = d; }));
            return latest;
        }
        function isExpired(item) {
            const d = latestDeadline(item);
            if (!d) return false;
            const today = new Date(); today.setHours(0,0,0,0);
            return d < today;
        }
        function isVacant(item, config) {
            const hasDesc = clean(item[config.descKey]).length > 0;
            const hasUrl = isRealUrl(item[config.urlKey]);
            const hasContact = isRealUrl(item[config.contactKey]) || /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(clean(item[config.contactKey]));
            const hasPill = (config.pills || []).some(k => clean(item[k]).length > 0);
            return !(hasDesc || hasUrl || hasContact || hasPill);
        }

        // Cleaned, de-duplicated, non-expired, non-vacant records for a tab.
        const _recordCache = {};
        function getRecords(tab) {
            if (_recordCache[tab]) return _recordCache[tab];
            const config = categoryConfigs[tab];
            const out = [], seen = new Set();
            (catalogueData[tab] || []).forEach(item => {
                if (!config || isExpired(item) || isVacant(item, config)) return;
                const key = (clean(item[config.titleKey]) || "").toLowerCase().replace(/[^a-z0-9]/g, "");
                if (key && seen.has(key)) return;
                if (key) seen.add(key);
                out.push(item);
            });
            _recordCache[tab] = out;
            return out;
        }

        // ==========================================
        // RELEVANCE — urgency tiers, geographic scope, region & ranking.
        // Lets users separate "act now" from "good to know" and filter to
        // opportunities that actually matter where they live.
        // ==========================================
        let regionFilter = "all";    // "all" | a region label
        let urgencyFilter = "all";   // "all" | "act" | "evergreen"

        const DAY = 86400000;
        function urgencyTier(item) {
            const d = latestDeadline(item);
            if (!d) return { tier: "evergreen", label: "Evergreen", color: "#34d399" };
            const days = Math.ceil((d.getTime() - new Date().setHours(0,0,0,0)) / DAY);
            if (days <= 30) return { tier: "act",  label: days <= 0 ? "Closing" : `Closes in ${days}d`, color: "#fb7185" };
            if (days <= 90) return { tier: "soon", label: `Apply by ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`, color: "#fbbf24" };
            return { tier: "scheduled", label: `Apply by ${d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`, color: "#22d3ee" };
        }

        // Some opportunities are inherently location-bound (festivals, grants);
        // most others you can pursue from anywhere.
        const LOCAL_CATEGORIES = new Set(["festivals", "grants"]);
        function recordScope(tab) { return LOCAL_CATEGORIES.has(tab) ? "local" : "global"; }

        const CA_PROV = /\b(BC|British Columbia|Alberta|AB|Saskatchewan|SK|Manitoba|MB|Ontario|ON|Quebec|QC|Nova Scotia|New Brunswick|Newfoundland|Yukon|Nunavut|Northwest Territories|PEI|Prince Edward)\b/i;
        const US_STATE = /\b(AL|AK|AZ|AR|CA|California|CO|Colorado|CT|DE|FL|Florida|GA|Georgia|HI|ID|IL|Illinois|IN|IA|KS|KY|LA|ME|MD|MA|Massachusetts|MI|Michigan|MN|MS|MO|MT|NE|NV|Nevada|NH|NJ|NM|NY|New York|NC|ND|OH|Ohio|OK|OR|Oregon|PA|Pennsylvania|RI|SC|SD|TN|Tennessee|TX|Texas|UT|VT|VA|Virginia|WA|Washington|WV|WI|Wisconsin|WY|USA|United States)\b/;
        function recordRegion(item) {
            const loc = clean(item.location) || clean(item.regions) || "";
            if (!loc) return "";
            if (/\b(canada|canadian)\b/i.test(loc) || CA_PROV.test(loc)) return "Canada";
            if (/\b(uk|united kingdom|england|london|scotland|wales)\b/i.test(loc)) return "United Kingdom";
            if (/\b(usa|united states)\b/i.test(loc) || US_STATE.test(loc)) return "United States";
            if (/\b(australia|sydney|melbourne)\b/i.test(loc)) return "Australia";
            const tail = loc.split(",").pop().trim();
            return tail.length > 2 ? tail : "";
        }

        function actionabilityScore(item, config) {
            let s = 0;
            if (isRealUrl(item[config.urlKey])) s += 3;
            if (isRealUrl(item[config.contactKey]) || /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(clean(item[config.contactKey]))) s += 2;
            const desc = clean(item[config.descKey]);
            s += desc.length > 60 ? 2 : (desc ? 1 : 0);
            (config.pills || []).forEach(k => { if (clean(item[k])) s += 1; });
            const t = urgencyTier(item).tier;
            if (t === "act") s += 2; else if (t === "soon") s += 1;
            return s;
        }

        // Records after region + urgency filters, ranked best-first.
        function getFilteredRecords(tab) {
            const config = categoryConfigs[tab];
            let recs = getRecords(tab).slice();
            if (urgencyFilter === "act")            recs = recs.filter(it => !!latestDeadline(it));
            else if (urgencyFilter === "evergreen") recs = recs.filter(it => !latestDeadline(it));
            if (regionFilter !== "all") {
                recs = recs.filter(it => recordScope(tab) === "global" || recordRegion(it) === regionFilter);
            }
            recs.sort((a, b) => actionabilityScore(b, config) - actionabilityScore(a, config));
            return recs;
        }

        let activeTab = "agencies";
        let currentView = "showcase"; // "showcase" or "expanded"
        let searchQuery = "";

        // Rolodex State
        const carousel = document.getElementById('carousel');
        const navDots = document.getElementById('nav-dots');
        let panelCount = 0;
        let theta = 0;
        let radius = 500;
        let currAngle = 0;
        let selectedIndex = 0;
        let isDragging = false;
        let lastFrameY = 0;
        let velocity = 0;
        let animationFrame;

        document.addEventListener('DOMContentLoaded', init);

        function init() {
            // Land on the first category that has clean records.
            const firstWithData = Object.keys(categoryConfigs).find(k => getRecords(k).length > 0);
            if (firstWithData) activeTab = firstWithData;

            renderNav();
            setupFilters();
            renderStats();
            switchTab(activeTab);

            // Map Modal Logic
            document.getElementById('open-map-btn').addEventListener('click', () => {
                const m = document.getElementById('map-modal');
                m.classList.remove('hidden'); m.classList.add('flex');
            });
            document.getElementById('close-map').addEventListener('click', () => {
                const m = document.getElementById('map-modal');
                m.classList.remove('flex'); m.classList.add('hidden');
            });

            // Search Logic
            document.getElementById("search-box").addEventListener("input", (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                renderExpandedGrid();
            });

            setupRolodexInteraction();
        }

        function refreshCurrentView() {
            if (currentView === "showcase") initCarousel(); else renderExpandedGrid();
            updateFilterCount();
        }
        function updateFilterCount() {
            const el = document.getElementById("filter-count");
            if (!el) return;
            const n = getFilteredRecords(activeTab).length;
            const total = getRecords(activeTab).length;
            el.innerText = (n === total) ? `${total} shown` : `${n} of ${total} shown`;
        }
        function applyUrgencyStyles() {
            document.querySelectorAll(".urg-btn").forEach(b => {
                const active = b.dataset.urg === urgencyFilter;
                b.className = "urg-btn px-3 py-1 rounded-full transition-colors " + (active ? "bg-primary/15 text-primary" : "text-outline hover:text-on-surface");
            });
        }
        function setupFilters() {
            // Region options derived from the locations present in the data.
            const counts = {};
            Object.keys(categoryConfigs).forEach(tab => {
                getRecords(tab).forEach(it => {
                    const r = recordRegion(it);
                    if (r) counts[r] = (counts[r] || 0) + 1;
                });
            });
            const select = document.getElementById("region-select");
            Object.keys(counts).sort((a, b) => counts[b] - counts[a]).forEach(r => {
                const o = document.createElement("option");
                o.value = r; o.text = `${r} (${counts[r]})`;
                select.appendChild(o);
            });
            select.addEventListener("change", e => { regionFilter = e.target.value; refreshCurrentView(); });
            document.querySelectorAll(".urg-btn").forEach(b => {
                b.addEventListener("click", () => { urgencyFilter = b.dataset.urg; applyUrgencyStyles(); refreshCurrentView(); });
            });
            applyUrgencyStyles();
        }

        function toggleView() {
            const toggleBg = document.getElementById('view-toggle');
            if (currentView === "showcase") {
                currentView = "expanded";
                toggleBg.setAttribute("data-view", "expanded");
                document.getElementById('opt-showcase').classList.remove('active');
                document.getElementById('opt-expanded').classList.add('active');
                
                document.getElementById('view-showcase').classList.add('hidden');
                document.getElementById('view-expanded').classList.remove('hidden');
                document.getElementById('view-expanded').classList.add('flex');
                
                renderExpandedGrid();
            } else {
                currentView = "showcase";
                toggleBg.setAttribute("data-view", "showcase");
                document.getElementById('opt-expanded').classList.remove('active');
                document.getElementById('opt-showcase').classList.add('active');
                
                document.getElementById('view-expanded').classList.add('hidden');
                document.getElementById('view-expanded').classList.remove('flex');
                document.getElementById('view-showcase').classList.remove('hidden');
                
                initCarousel();
            }
        }

        function renderNav() {
            const nav = document.getElementById("categories-nav");
            nav.innerHTML = "";
            
            Object.keys(categoryConfigs).forEach(key => {
                const config = categoryConfigs[key];
                const items = getRecords(key);

                a.onclick = (e) => { e.preventDefault(); switchTab(key); };
                a.innerHTML = `
                    <span class="material-symbols-outlined text-[20px] transition-colors">${config.icon}</span>
                    <span class="text-sm font-medium flex-1">${config.label}</span>
                    <span class="text-[10px] font-bold bg-surface-container border border-outline-variant/30 px-2 py-0.5 rounded-full">${items.length}</span>
                `;
                nav.appendChild(a);

        }

        function switchTab(key) {
            document.querySelectorAll("#categories-nav a").forEach(el => {
                el.className = "flex items-center py-3 px-4 gap-3 cursor-pointer text-outline hover:bg-surface-variant/30 hover:text-on-surface rounded-xl transition-all border border-transparent";
            });
            const activeNav = document.getElementById(`nav-${key}`);
            if (activeNav) {
                activeNav.className = "flex items-center py-3 px-4 gap-3 cursor-pointer text-primary bg-primary/10 border border-primary/20 rounded-xl transition-all shadow-[inset_4px_0_0_var(--primary)]";
            }

            activeTab = key;
            const config = categoryConfigs[key];
            
            document.getElementById("header-title").innerText = `${config.label} Catalogue`;
            document.getElementById("grid-category-icon").innerText = config.icon;
            document.getElementById("grid-category-name").innerText = config.label;
            
            if (currentView === "showcase") {
                initCarousel();
            } else {
                renderExpandedGrid();

            updateFilterCount();
        }

        function renderStats() {
            const banner = document.getElementById("stats-banner");
            banner.innerHTML = "";

            const totalAgencies = getRecords("agencies").length;
            const totalSupervisors = getRecords("supervisors").length;
            const totalLibraries = getRecords("music_libraries").length;

                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-1 h-full" style="background: linear-gradient(to bottom, ${stat.color}, transparent);"></div>
                    <div class="text-xs font-bold uppercase tracking-wider text-outline pl-2">${stat.label}</div>
                    <div class="text-4xl font-black text-on-surface pl-2 tracking-tight">${stat.value}</div>
                `;

        // ==========================================
        // 3D ROLODEX LOGIC (Showcase View)
        // ==========================================
        function initCarousel() {
            carousel.innerHTML = "";
            navDots.innerHTML = "";
            currAngle = 0; velocity = 0;
            if (animationFrame) cancelAnimationFrame(animationFrame);

            const items = getFilteredRecords(activeTab);
            if (items.length === 0) {
                carousel.innerHTML = `<div class="carousel-cell flex items-center justify-center text-outline">No records match these filters.</div>`;
                return;
            }

            panelCount = items.length;
            theta = 360 / panelCount;
            radius = Math.max(500, panelCount * 55);

            const config = categoryConfigs[activeTab];

            items.forEach((item, i) => {
                const cell = document.createElement('div');
                
                const themeIndex = i % 3;
                let themeClasses = "";
                let titleColor = "text-on-surface";
                let subTextColor = "text-outline";
                let iconColor = "text-primary";
                let actionBtn = "bg-primary text-on-primary";

                if (themeIndex === 0) {
                    themeClasses = "carousel-cell bg-surface-container";
                } else if (themeIndex === 1) {
                    themeClasses = "carousel-cell bg-on-surface text-surface-container-lowest";
                    titleColor = "text-surface-container-lowest";
                    subTextColor = "text-surface-container-low/70";
                    iconColor = "text-surface-container-lowest";
                    actionBtn = "bg-surface-container-lowest text-on-surface";
                } else {
                    const isPrimary = i % 2 === 0;
                    themeClasses = isPrimary ? "carousel-cell bg-primary text-on-primary" : "carousel-cell bg-secondary text-white";
                    titleColor = isPrimary ? "text-on-primary" : "text-white";
                    subTextColor = isPrimary ? "text-on-primary/70" : "text-white/70";
                    iconColor = isPrimary ? "text-on-primary" : "text-white";
                    actionBtn = isPrimary ? "bg-on-primary text-primary" : "bg-on-secondary text-secondary";
                }

                cell.className = themeClasses;

                const title = clean(item[config.titleKey]) || "Untitled";
                const subtitle = clean(item[config.subtitleKey]);
                const desc = clean(item[config.descKey]) || "Details available at the source — open it to learn more.";
                const hasUrl = isRealUrl(item[config.urlKey]);
                const contactClean = clean(item[config.contactKey]);
                const contactIsLink = isRealUrl(item[config.contactKey]) || /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(contactClean);

                // Surface the previously-hidden fields as chips.
                let pillsHtml = "";
                (config.pills || []).forEach(k => {
                    const v = clean(item[k]);
                    if (v) pillsHtml += `<span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-black/10 border border-white/15 ${iconColor}">${v}</span>`;
                });

                // Urgency-driven status: separates "act now" from "good to know".
                const tier = urgencyTier(item);
                const statusRaw = clean(item.submission_status);
                const badgeLabel = statusRaw || tier.label;
                const badgeHtml = `<span style="background:${tier.color}22; border-color:${tier.color}88; color:${tier.color};" class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border">${badgeLabel}</span>`;
                cell.style.borderColor = tier.color + "99"; // color-code the whole card by urgency

                // CTA: deep link when we have one, else a context-rich Google
                // search. A subtle search icon is always offered as "dig deeper".
                const gUrl = googleSearchUrl(item, config, activeTab);
                let primaryHtml;
                if (hasUrl) {
                    primaryHtml = `<a href="${hrefFor(item[config.urlKey])}" target="_blank" class="flex-1 ${actionBtn} text-xs font-bold uppercase tracking-widest py-4 rounded-xl flex items-center justify-center gap-2 tactile-btn border border-black/10">Visit Resource <span class="material-symbols-outlined text-[18px]">open_in_new</span></a>`;
                } else if (contactIsLink) {
                    primaryHtml = `<a href="${hrefFor(item[config.contactKey])}" target="_blank" class="flex-1 ${actionBtn} text-xs font-bold uppercase tracking-widest py-4 rounded-xl flex items-center justify-center gap-2 tactile-btn border border-black/10">Get in touch <span class="material-symbols-outlined text-[18px]">mail</span></a>`;
                } else {
                    primaryHtml = `<a href="${gUrl}" target="_blank" class="flex-1 ${actionBtn} text-xs font-bold uppercase tracking-widest py-4 rounded-xl flex items-center justify-center gap-2 tactile-btn border border-black/10">Search Google <span class="material-symbols-outlined text-[18px]">travel_explore</span></a>`;
                }
                const secondaryHtml = (hasUrl || contactIsLink)
                    ? `<a href="${gUrl}" target="_blank" title="Search Google for more" class="w-14 flex items-center justify-center rounded-xl border border-black/10 bg-black/10 ${iconColor} tactile-btn"><span class="material-symbols-outlined text-[20px]">travel_explore</span></a>`
                    : "";
                const ctaHtml = primaryHtml + secondaryHtml;
                const contactLine = (contactClean && !contactIsLink && contactClean !== subtitle)
                    ? `<div class="flex items-center gap-2 text-xs font-mono opacity-70 mt-3 pt-3 border-t border-white/10"><span class="material-symbols-outlined text-[14px]">alternate_email</span><span class="truncate">${contactClean}</span></div>`
                    : "";

                cell.innerHTML = `
                    <div class="flex flex-col gap-5 overflow-y-auto custom-scrollbar pr-2 h-full">
                        <div class="flex justify-between items-start">
                            <div class="w-14 h-14 rounded-2xl bg-black/10 border border-white/20 flex items-center justify-center flex-shrink-0 shadow-inner">
                                <span class="material-symbols-outlined text-3xl ${iconColor}">${config.icon}</span>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                ${badgeHtml}
                                <span class="text-[10px] font-mono opacity-50">RECORD ${i+1}/${panelCount}</span>
                            </div>
                        </div>

                        <div>
                            <h2 class="text-3xl font-bold ${titleColor} tracking-tight leading-tight">${title}</h2>
                            ${subtitle ? `<div class="flex items-center gap-3 mt-2 ${subTextColor} font-medium text-sm"><span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">info</span>${subtitle}</span></div>` : ''}
                        </div>

                        ${pillsHtml ? `<div class="flex flex-wrap gap-2">${pillsHtml}</div>` : ''}

                        <div class="p-5 rounded-2xl bg-black/5 border border-white/10 relative overflow-hidden flex-1">
                            <h3 class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2 flex items-center gap-2">
                                <span class="material-symbols-outlined text-[16px]">subject</span>Details
                            </h3>
                            <p class="text-sm leading-relaxed opacity-90 font-light">${desc}</p>
                            ${contactLine}
                        </div>

                        ${ctaHtml ? `<div class="pt-1 flex gap-3">${ctaHtml}</div>` : ''}
                    </div>
                `;
                carousel.appendChild(cell);

                const dot = document.createElement('div');
                dot.className = `h-1.5 rounded-full transition-all duration-300 ${i === 0 ? 'w-6 bg-primary glow-cyan' : 'w-1.5 bg-outline-variant/40'}`;
                navDots.appendChild(dot);
            });
            updateCarousel();
        }

        function updateCarousel() {
            if (panelCount === 0) return;

            // ---- "Over the hill" arc -------------------------------------
            // Each card is placed individually by its distance from centre,
            // so the deck crests at the front (full size, facing you) and
            // cascades DOWN + BACK in z on both sides — a waterfall over a
            // hill, not a flat spinning wheel. Tune the feel here:
            const SPREAD   = 28;    // degrees of arc per card-step
            const DEPTH    = 1500;  // px each card recedes going over the hill
            const DROP     = 300;   // px each card falls on the way down
            const TILT     = 50;    // max lean (deg) as a card goes over the crest
            const MINSCALE = 0.45;  // smallest a far card shrinks to
            const VISIBLE  = 5;     // cards rendered on each side of centre
            // --------------------------------------------------------------

            selectedIndex = ((Math.round(currAngle / theta) % panelCount) + panelCount) % panelCount;

            const cells = carousel.children;
            for (let i = 0; i < cells.length; i++) {
                let rel = (theta * i - currAngle) % 360;
                if (rel > 180)  rel -= 360;
                if (rel < -180) rel += 360;
                const step   = rel / theta;        // signed card-steps from centre
                const adStep = Math.abs(step);

                if (adStep > VISIBLE) { cells[i].style.display = 'none'; continue; }
                cells[i].style.display = '';

                const a    = step * SPREAD * Math.PI / 180;       // arc angle
                const z    = (Math.cos(a) - 1) * DEPTH;           // recede both sides
                const y    = (1 - Math.cos(a)) * DROP;            // fall both sides
                const sc   = Math.max(MINSCALE, Math.pow(Math.cos(a), 1.6)); // shrink faster both sides
                const tilt = Math.max(-TILT, Math.min(TILT, step * (TILT / 2)));

                cells[i].style.transform =
                    `translateZ(${z}px) translateY(${y}px) rotateX(${tilt}deg) scale(${sc})`;
                cells[i].style.zIndex = Math.round(1000 - adStep * 10).toString();

                if (adStep < 0.5) {
                    cells[i].classList.remove('is-inactive');
                    cells[i].style.opacity = '1';
                    cells[i].style.filter = 'none';
                } else {
                    cells[i].classList.add('is-inactive');
                    const f = Math.max(0, 1 - adStep / VISIBLE);
                    cells[i].style.opacity = (0.12 + f * 0.88).toString();
                    cells[i].style.filter = `brightness(${0.45 + f * 0.55}) blur(${Math.min(5, adStep)}px)`;
                }
            }

            const dots = navDots.children;
            for (let i = 0; i < dots.length; i++) {
                dots[i].className = `h-1.5 rounded-full transition-all duration-300 ${i === selectedIndex ? 'w-6 bg-primary glow-cyan' : 'w-1.5 bg-outline-variant/40'}`;
            }
        }

        function snapToNearest() {
            if (panelCount === 0) return;
            const snapAngle = Math.round(currAngle / theta) * theta;
            const start = currAngle;
            const change = snapAngle - start;
            let currentTime = 0;
            const duration = 25;
            function animateSnap() {
                currentTime++;
                const ease = 1 - Math.pow(1 - currentTime / duration, 3);
                currAngle = start + change * ease;
                updateCarousel();
                if (currentTime < duration) animationFrame = requestAnimationFrame(animateSnap);
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animateSnap();
        }

        function setupRolodexInteraction() {
            const rc = document.getElementById('view-showcase');

            rc.addEventListener('mousedown', (e) => {
                isDragging = true; lastFrameY = e.clientY; velocity = 0;
                if (animationFrame) cancelAnimationFrame(animationFrame);
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaY = e.clientY - lastFrameY; lastFrameY = e.clientY;
                currAngle += deltaY * 0.15;
                velocity = deltaY * 0.4;
                updateCarousel();
            });
            window.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;
                applyInertia();
            });
            rc.addEventListener('wheel', (e) => {
                e.preventDefault();
                currAngle += e.deltaY * 0.08;
                updateCarousel();
                clearTimeout(window.wheelTimeout);
                window.wheelTimeout = setTimeout(snapToNearest, 200);
            }, { passive: false });

            function applyInertia() {
                if (Math.abs(velocity) < 0.2) { snapToNearest(); return; }
                currAngle += velocity;
                velocity *= 0.92;
                updateCarousel();
                animationFrame = requestAnimationFrame(applyInertia);
            }
        }

        function rotateToNext() {
            if (panelCount) {
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animateTo(Math.round(currAngle / theta) * theta + theta);
            }
        }
        function rotateToPrev() {
            if (panelCount) {
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animateTo(Math.round(currAngle / theta) * theta - theta);
            }
        }
        function animateTo(target) {
            const start = currAngle;
            const change = target - start;
            let t = 0;
            function frame() {
                t += 0.05;
                if (t >= 1) {
                    currAngle = target;
                    updateCarousel();
                    return;
                }
                const ease = 1 - Math.pow(1 - t, 5);
                currAngle = start + change * ease;
                updateCarousel();
                animationFrame = requestAnimationFrame(frame);
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
            frame();
        }

        window.addEventListener('keydown', (e) => {
            if (currentView === "showcase") {
                if (e.key === 'ArrowUp') rotateToPrev();
                if (e.key === 'ArrowDown') rotateToNext();
            }
        });

// ==========================================
        // EXPANDED BENTO GRID LOGIC
        // ==========================================

        function renderExpandedGrid() {
            const container = document.getElementById("opp-container");
            container.innerHTML = "";

            const items = getFilteredRecords(activeTab);
            const config = categoryConfigs[activeTab];

            const filteredItems = items.filter(item => {
                if (!searchQuery) return true;
                return Object.values(item).some(val => val && val.toString().toLowerCase().includes(searchQuery));
            });

            document.getElementById("results-count-badge").innerText = `Showing ${filteredItems.length} of ${items.length} records`;

            if (filteredItems.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-outline">No records match your search.</div>`;
                return;
            }

            filteredItems.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-surface-lowest border border-outline-variant/40 rounded-2xl p-6 flex flex-col bento-card relative overflow-hidden group";

                const title = clean(item[config.titleKey]) || "Untitled";
                const subtitle = clean(item[config.subtitleKey]);
                const desc = clean(item[config.descKey]) || "Details available at the source.";
                const hasUrl = isRealUrl(item[config.urlKey]);
                const contactClean = clean(item[config.contactKey]);
                const contactIsLink = isRealUrl(item[config.contactKey]) || /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(contactClean);

                const tier = urgencyTier(item);
                let pillsHtml = `<span style="background:${tier.color}22; border-color:${tier.color}88; color:${tier.color};" class="text-[10px] font-black uppercase tracking-wider px-2 py-1 rounded-md border">${tier.label}</span>`;
                if (config.pills) {
                    config.pills.forEach(pillKey => {
                        const v = clean(item[pillKey]);
                        if (v) {
                            pillsHtml += `<span class="bg-surface-variant text-outline text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md border border-outline-variant/50">${v}</span>`;
                        }
                    });
                }

                card.style.borderColor = tier.color + "55"; // color-code by urgency
                card.innerHTML = `
                    <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                        <span class="material-symbols-outlined text-6xl text-primary">${config.icon}</span>
                    </div>
                    
                    <div class="relative z-10 flex flex-col h-full">
                        <h4 class="text-xl font-bold text-on-surface mb-1 pr-12 leading-tight">${title}</h4>
                        ${subtitle ? `<p class="text-sm font-medium text-primary mb-4 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">my_location</span>${subtitle}</p>` : '<div class="h-4 mb-4"></div>'}
                        
                        <div class="flex flex-wrap gap-2 mb-5">
                            ${pillsHtml}
                        </div>
                        
                        <div class="bg-surface-container/50 border border-outline-variant/30 rounded-xl p-4 flex-1 mb-5">
                            <p class="text-sm text-on-surface-variant font-light leading-relaxed line-clamp-4">${desc}</p>
                        </div>
                        
                        <div class="mt-auto pt-4 border-t border-outline-variant/20 flex justify-between items-center">
                            <div class="text-xs font-mono text-outline truncate max-w-[55%]">
                                ${contactClean && !contactIsLink ? contactClean : ""}
                            </div>
                            <div class="flex items-center gap-2">
                                ${(hasUrl || contactIsLink) ? `<a href="${googleSearchUrl(item, config, activeTab)}" target="_blank" title="Search Google for more" class="text-outline hover:text-primary transition-colors p-2 rounded-lg tactile-btn"><span class="material-symbols-outlined text-[20px]">travel_explore</span></a>` : ''}
                                ${(hasUrl || contactIsLink)
                                    ? `<a href="${hrefFor(hasUrl ? item[config.urlKey] : item[config.contactKey])}" target="_blank" title="${hasUrl ? 'Visit resource' : 'Contact'}" class="text-primary hover:text-white bg-primary/10 hover:bg-primary transition-colors p-2 rounded-lg tactile-btn"><span class="material-symbols-outlined text-[20px]">${hasUrl ? 'arrow_forward' : 'mail'}</span></a>`
                                    : `<a href="${googleSearchUrl(item, config, activeTab)}" target="_blank" class="text-primary hover:text-white bg-primary/10 hover:bg-primary transition-colors px-3 py-2 rounded-lg tactile-btn text-xs font-bold uppercase tracking-wider flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">travel_explore</span>Search</a>`}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
